version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - chess-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/chess_project}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-5000}
    depends_on:
      - mongodb
      - redis
    networks:
      - chess-net

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - chess-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - chess-net

networks:
  chess-net:
    driver: bridge

volumes:
  mongo-data:
